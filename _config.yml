name: Sitename
markdown: kramdown
baseurl: ""
url: http://sandeepbhardwaj.github.io

#
# Pagination.
#
paginate: 4
paginate_path: "blog/page:num/"


highlighter: pygments

#
# Scripts.
#
google_analytics: UA-68409070-1 # e.g. UA-68409070-1
disqus_user: sandeepbhardwaj # sandeepbhardwaj

#
# Gems.
#
#gems:
#- archives
#- jekyll-sitemap


#
# Localizations.
#
author_name: Sandeep Bhardwaj
