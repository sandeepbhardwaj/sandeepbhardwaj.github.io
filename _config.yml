title: "Code to Architecture"
subtitle: "Designing Systems That Scale Beyond Code"
name: "Sandeep Bhardwaj"
description: "Technical deep dives on backend systems and SaaS architecture."
url: "https://sandeepbhardwaj.github.io"
baseurl: ""
repository: "sandeepbhardwaj/sandeepbhardwaj.github.io"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"

locale: "en-US"
timezone: "Asia/Kolkata"
search: true

sass:
  style: compressed
  sourcemap: never

author:
  name: "Sandeep Bhardwaj"
  avatar: "/assets/images/author-avatar.svg"
  bio: "Backend Engineer • SaaS Builder"
  location: "India"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:hello@sandeepbhardwaj.dev"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sandeepbhardwaj"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sandeepbhardwaj/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sandeepbhardwaj"
    - label: "RSS Feed"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"
    - label: "Privacy"
      icon: "fas fa-fw fa-shield-alt"
      url: "/privacy-policy/"
    - label: "Terms"
      icon: "fas fa-fw fa-file-contract"
      url: "/terms/"
    - label: "Disclaimer"
      icon: "fas fa-fw fa-exclamation-circle"
      url: "/disclaimer/"
    - label: "Cookies"
      icon: "fas fa-fw fa-cookie-bite"
      url: "/cookie-policy/"

followit:
  enabled: true
  url: "https://follow.it/code-to-architecture?leanpub"
  footer_label: "Subscribe via email"

plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-last-modified-at
  - jekyll-gfm-admonitions

atom_feed:
  hide: true

paginate: 5
paginate_path: /page:num/

permalink: /:categories/:title/
category_dir: topics
tag_dir: labels

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      classes:
        - wide
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true
      toc: false
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: jekyll-archives
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

jekyll-archives:
  enabled:
    - categories
  layouts:
    category: archive-taxonomy
  permalinks:
    category: /categories/:name/

social:
  type: Person
  name: "Sandeep Bhardwaj"
  links:
    - "https://github.com/sandeepbhardwaj"
    - "https://www.linkedin.com/in/sandeepbhardwaj/"

seo:
  type: Blog
  name: "Sandeep Bhardwaj Technical Blog"

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-B895SGXR6X"
    anonymize_ip: true

comments:
  provider: "custom"
  giscus:
    enabled: true # Set to true after GitHub Discussions is enabled and category values are filled in.
    repo: "sandeepbhardwaj/sandeepbhardwaj.github.io"
    repo_id: "R_kgDORakAGg"
    category: "Comments" # Example: "Comments"
    category_id: "DIC_kwDORakAGs4C4XE6" # Paste the category ID generated by https://giscus.app.
    mapping: "pathname"
    term: ""
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "top"
    light_theme: "light"
    dark_theme: "dark_dimmed"
    lang: "en"
    loading: "lazy"

og_image: /assets/images/site-og-image.png
social_share_image: /assets/images/site-og-image.png
og_image_alt: "Code to Architecture banner with the tagline Designing Systems That Scale Beyond Code."
