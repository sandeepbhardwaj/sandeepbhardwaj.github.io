title: "Code to Architecture"
subtitle: "Designing Systems That Scale Beyond Code"
name: "Sandeep Bhardwaj"
description: "Technical deep dives on backend systems and SaaS architecture."
url: "https://sandeepbhardwaj.github.io"
baseurl: ""
repository: "sandeepbhardwaj/sandeepbhardwaj.github.io"

locale: "en-US"
timezone: "Asia/Kolkata"

sass:
  style: compressed
  sourcemap: never

author:
  name: "Sandeep Bhardwaj"
  avatar: "/assets/images/author-avatar.svg"
  bio: "Backend Engineer • SaaS Builder"
  location: "India"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:hello@sandeepbhardwaj.dev"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sandeepbhardwaj"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sandeepbhardwaj/"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sandeepbhardwaj"
    - label: "RSS Feed"
      icon: "fas fa-fw fa-rss-square"
      url: "/feed.xml"
    - label: "Privacy"
      icon: "fas fa-fw fa-shield-alt"
      url: "/privacy-policy/"
    - label: "Terms"
      icon: "fas fa-fw fa-file-contract"
      url: "/terms/"
    - label: "Disclaimer"
      icon: "fas fa-fw fa-exclamation-circle"
      url: "/disclaimer/"
    - label: "Cookies"
      icon: "fas fa-fw fa-cookie-bite"
      url: "/cookie-policy/"

appearance:
  default_theme: dark

integrations:
  adsense:
    enabled: true
    client: "ca-pub-9148159911868814"
    load_in_production_only: true
    auto_ads: true
  site_verification:
    google: "2CJcM2GggRVsrjgINoCQzUNh4UPupGbAIKCSeS7nfoI"
  analytics:
    provider: "google-gtag"
    tracking_id: "G-B895SGXR6X"
    anonymize_ip: true
  newsletter:
    provider: "followit"
    enabled: true
    url: "https://follow.it/code-to-architecture?leanpub"
    footer_label: "Subscribe via email"
  comments:
    provider: "giscus"
    enabled: true
    repo: "sandeepbhardwaj/sandeepbhardwaj.github.io"
    repo_id: "R_kgDORakAGg"
    category: "Comments"
    category_id: "DIC_kwDORakAGs4C4XE6"
    mapping: "pathname"
    term: ""
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "top"
    light_theme: "light"
    dark_theme: "dark_dimmed"
    lang: "en"
    loading: "lazy"

features:
  search:
    enabled: true
  theme_toggle: true
  code_copy: true
  mermaid: true
  toc:
    enabled_by_default: false
    sticky: true
    default_label: "In This Article"
    default_icon: "cog"
  read_time:
    enabled_by_default: true
  comments:
    enabled_by_default: true
  social_share:
    enabled_by_default: true
  related_posts:
    enabled_by_default: true

plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-last-modified-at
  - jekyll-gfm-admonitions

paginate: 5
paginate_path: /page:num/

permalink: /:categories/:title/
category_dir: topics
tag_dir: labels

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true
      toc: false
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page
      author_profile: false

category_archive:
  type: jekyll-archives
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

jekyll-archives:
  enabled:
    - categories
  layouts:
    category: archive-taxonomy
  permalinks:
    category: /categories/:name/

social:
  type: Person
  name: "Sandeep Bhardwaj"
  links:
    - "https://github.com/sandeepbhardwaj"
    - "https://www.linkedin.com/in/sandeepbhardwaj/"

seo:
  type: Blog
  name: "Sandeep Bhardwaj Technical Blog"

og_image: /assets/images/site-og-image.png
social_share_image: /assets/images/site-og-image.png
og_image_alt: "Code to Architecture banner with the tagline Designing Systems That Scale Beyond Code."
