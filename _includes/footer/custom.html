{% assign followit = site.followit %}
{% assign followit_url = followit.url | default: "" | strip %}
{% if followit.enabled and followit_url != "" %}
  <div class="page__footer-follow">
    <ul class="social-icons">
      <li>
        <a href="{{ followit_url }}" rel="nofollow noopener noreferrer">
          <i class="fas fa-fw fa-envelope" aria-hidden="true"></i> {{ followit.footer_label | default: "Subscribe via email" }}
        </a>
      </li>
    </ul>
  </div>
{% endif %}
