<style>
  :root {
    --theme-toggle-size: 2rem;
    --theme-toggle-font-size: 1rem;
    --theme-toggle-border: rgba(100, 116, 139, 0.35);
    --theme-toggle-border-hover: rgba(71, 85, 105, 0.5);
    --theme-toggle-bg: rgba(255, 255, 255, 0.9);
    --theme-toggle-bg-hover: #ffffff;
    --theme-toggle-fg: #0f172a;
    --theme-toggle-mobile-hover: rgba(148, 163, 184, 0.15);
    --brand-grad-start: #f97316;
    --brand-grad-end: #06b6d4;
    --brand-subtitle-bg: rgba(15, 23, 42, 0.08);
    --brand-subtitle-fg: #0f172a;
    --brand-subtitle-border: rgba(15, 23, 42, 0.12);
  }

  [data-theme="dark"] {
    --theme-toggle-border: rgba(148, 163, 184, 0.45);
    --theme-toggle-border-hover: rgba(148, 163, 184, 0.65);
    --theme-toggle-bg: rgba(15, 23, 42, 0.85);
    --theme-toggle-bg-hover: rgba(30, 41, 59, 0.95);
    --theme-toggle-fg: #f8fafc;
    --theme-toggle-mobile-hover: rgba(148, 163, 184, 0.2);
    --brand-grad-start: #fb923c;
    --brand-grad-end: #22d3ee;
    --brand-subtitle-bg: rgba(226, 232, 240, 0.08);
    --brand-subtitle-fg: #f8fafc;
    --brand-subtitle-border: rgba(226, 232, 240, 0.18);
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: var(--theme-toggle-size);
    height: var(--theme-toggle-size);
    margin-left: 0.35rem;
    border: 1px solid var(--theme-toggle-border);
    border-radius: 999px;
    background: var(--theme-toggle-bg);
    color: var(--theme-toggle-fg);
    font-size: var(--theme-toggle-font-size);
    line-height: 1;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .theme-toggle:hover {
    background: var(--theme-toggle-bg-hover);
    border-color: var(--theme-toggle-border-hover);
  }

  /* Desktop/top nav button */
  .greedy-nav .visible-links .masthead__menu-item--theme-toggle {
    display: flex;
    align-items: center;
    padding-left: 0.25rem;
    padding-right: 0;
  }

  .greedy-nav .visible-links .masthead__menu-item--theme-toggle .theme-toggle {
    width: 1.75rem;
    height: 1.75rem;
    margin-left: 0;
  }

  /* Mobile overflow menu row */
  .greedy-nav .hidden-links .masthead__menu-item--theme-toggle {
    padding: 0;
  }

  .greedy-nav .hidden-links .masthead__menu-item--theme-toggle .theme-toggle {
    width: 100%;
    height: auto;
    margin: 0;
    padding: 0.7rem 1rem;
    border: 0;
    border-radius: 0;
    background: transparent;
    justify-content: flex-start;
    font-size: var(--theme-toggle-font-size);
  }

  .greedy-nav .hidden-links .masthead__menu-item--theme-toggle .theme-toggle:hover {
    background: var(--theme-toggle-mobile-hover);
    border-color: transparent;
  }

  /* Brand styling */
  .masthead .site-title {
    display: flex;
    flex-direction: column;
    gap: 0.18rem;
    line-height: 1.05;
    letter-spacing: 0.01em;
    font-weight: 800;
    font-size: 1.26rem;
    text-wrap: balance;
    background-image: linear-gradient(90deg, var(--brand-grad-start), var(--brand-grad-end));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  .masthead .site-title .site-subtitle {
    display: inline-block;
    width: fit-content;
    max-width: min(52ch, 92vw);
    margin-top: 0.22rem;
    padding: 0.16rem 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    color: var(--brand-subtitle-fg);
    -webkit-text-fill-color: initial;
    font-size: 0.76rem;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: none;
    line-height: 1.2;
    white-space: normal;
    opacity: 0.9;
    position: relative;
    text-wrap: pretty;
  }

  [data-theme="dark"] .masthead .site-title .site-subtitle {
    opacity: 1;
    text-shadow: 0 1px 0 rgba(15, 23, 42, 0.45);
  }

  .masthead .site-title .site-subtitle::before {
    content: "</>";
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.2rem;
    height: 1.15rem;
    margin-right: 0.5rem;
    vertical-align: middle;
    border-radius: 0.35rem;
    background: linear-gradient(90deg, var(--brand-grad-start), var(--brand-grad-end));
    color: #ffffff;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.01em;
    line-height: 1;
  }

  @media (max-width: 920px) {
    .masthead .site-title {
      font-size: 1.06rem;
    }

    .masthead .site-title .site-subtitle {
      font-size: 0.66rem;
      padding: 0.14rem 0;
      max-width: min(40ch, 78vw);
    }

    .masthead .site-title .site-subtitle::before {
      min-width: 1.72rem;
      height: 0.98rem;
      margin-right: 0.35rem;
      font-size: 0.54rem;
    }
  }
</style>

<script>
  window.__SITE_BASEURL = "{{ site.baseurl | default: '' }}";
</script>
