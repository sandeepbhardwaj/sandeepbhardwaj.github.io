<!-- Fixed navbar -->
<div class="navbar navbar-default" role="navigation">
  <div class="container">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="{{ " /index.html " | prepend: site.baseurl }}">Sandeep Blogging</a>
    </div>
    <div class="navbar-collapse collapse">
      <ul class="nav navbar-nav navbar-right">
        <li {% if page.title=="Home" %} class="active" {% endif %}>
          <a href="{{ " /index.html " | prepend: site.baseurl }}">Home</a>
        </li>

        <li {% if page.title=="Archives" %} class="active" {% endif %}>
          <a href="{{ " /archives.html " | prepend: site.baseurl }}">Blog Archive</a>
        </li>


        <li class="dropdown">
          <a href="#" class="dropdown-toggle" data-toggle="dropdown">Categories <b class="caret"></b></a>
          <ul class="dropdown-menu">
            {% for category in site.categories %}
                <li><a href="/category/{{category[0] | slugify | downcase | prepend: site.baseurl}}/">{{ category[0] }}</a></li>
            {% endfor %}
          </ul>
        </li>

        <li>
          <a href="{{ " /feed.xml " | prepend: site.baseurl }}" rel="alternate" type="application/atom+xml" class="fa fa-rss fa-2x"></i></a>
        </li>
        <li>
          <a href="{{ " /sitemap.xml " | prepend: site.baseurl }}" rel="alternate" type="application/xml" class="fa fa-sitemap fa-2x"></i></a>
        </li>
      </ul>
    </div>
    <!--/.nav-collapse -->
  </div>
</div>
