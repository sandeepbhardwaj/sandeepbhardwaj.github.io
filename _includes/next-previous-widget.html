<ul class="pager">
{% if page.previous %} 
    <li class="previous">
    <a rel="prev" href="{{ page.previous.url }}">&laquo; {{ site.str_prev_posts}}</a>
    </li>
    {% endif %}

    {% if page.next %} 
    <li class="next">
    <a rel="next" href="{{ page.next.url }}">{{ site.str_next_posts}} &raquo;</a>
    </li>
{% endif %}
</ul>
