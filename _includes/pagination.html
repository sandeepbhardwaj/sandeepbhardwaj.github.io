{% if paginator and paginator.total_pages > 1 %}
  <nav class="pagination" aria-label="Pagination">
    {% if paginator.previous_page %}
      <a class="pagination__link" href="{{ paginator.previous_page_path | relative_url }}">Previous</a>
    {% else %}
      <span class="pagination__link pagination__link--disabled">Previous</span>
    {% endif %}

    <span class="pagination__status">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>

    {% if paginator.next_page %}
      <a class="pagination__link" href="{{ paginator.next_page_path | relative_url }}">Next</a>
    {% else %}
      <span class="pagination__link pagination__link--disabled">Next</span>
    {% endif %}
  </nav>
{% endif %}
