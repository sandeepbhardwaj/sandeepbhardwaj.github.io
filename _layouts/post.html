---
  layout: default
---
<!-- Page Content -->
<div class="container">
    <div class="row">
        <!-- Blog Entries Column -->
        <div class="col-md-12">
        <div class="post">
            <h1 class="post-title">{{ page.title }}</h1>
            <p>
                <i class="fa fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }} by {{ site.author_name}}  | <i class="fa fa-tags"></i> Tags: 

               
                    {% for tag in page.tags %}
                       <a class="tag" href="/tags/{{ tag | slugify }}/">{{ tag }}</a>
                    {% endfor %}
               

                <a class="pull-right" href="{{ post.url }}#disqus_thread"></a>
            </p>
            <hr>

            {{ content }}
           
        </div>

            <br/>{% include share-page.html %}<br/>

            {% include next-previous-widget.html %}
            <br/><br/>
            {% include disqus.html %}
        </div>
    </div>
</div>
