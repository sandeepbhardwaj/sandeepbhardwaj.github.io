---
  layout: default
---
<!-- Page Content -->
<div class="container">
    <div class="row">
        <!-- Blog Entries Column -->
        <div class="col-md-12">
            <h1 class="post-title">{{ page.title }}</h1>
            <p>
                <span class="glyphicon glyphicon-time"></span> Posted on {{ page.date | date: "%B %d, %Y" }} by {{ site.author_name}}
            </p>
            <hr>

            {{ content }}

            <hr>

            {% include disqus.html %}
        </div>
    </div>
</div>
