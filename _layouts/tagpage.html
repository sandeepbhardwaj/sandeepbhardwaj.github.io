---
layout: page
---
<h1>{{ page.tag }}</h1>
<ul>
{% for post in site.tags[page.tag] %}
  <li><a href="{{ post.url }}">{{ post.title }}</a> ( <i class="fa fa-calendar"></i> {{ post.date | date_to_string }} | <i class="fa fa-tags"></i> Tags: 
	{% for tag in post.tags %}
	<a href="/tags/{{ tag | slugify }}/">
	{{ tag }},  
	</a>
	{% endfor %}
	)
  </li>
{% endfor %}
</ul>
