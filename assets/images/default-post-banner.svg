<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Engineering Notes Banner</title>
  <desc id="desc">Default banner for blog posts with geometric lines and gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.5">
    <circle cx="1280" cy="190" r="300" fill="#38bdf8" fill-opacity="0.16"/>
    <circle cx="260" cy="730" r="250" fill="#22d3ee" fill-opacity="0.12"/>
  </g>

  <g fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <path d="M120 700 C360 570, 520 800, 790 660 S1220 540, 1480 610"/>
    <path d="M120 760 C360 630, 570 840, 810 740 S1220 630, 1480 700" opacity="0.7"/>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif" fill="#e2e8f0">
    <text x="120" y="250" font-size="70" font-weight="700">Engineering Notes</text>
    <text x="120" y="320" font-size="36" opacity="0.92">Practical examples for Java, algorithms, and system design</text>
  </g>
</svg>
