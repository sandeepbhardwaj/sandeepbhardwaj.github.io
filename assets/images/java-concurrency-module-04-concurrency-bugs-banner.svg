<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" role="img" aria-labelledby="title desc">
  <title id="title">Java Concurrency Module 4 Banner</title>
  <desc id="desc">Concurrency bugs banner for the Java concurrency series.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="480" fill="url(#bg)"/>
  <g fill="none" stroke="rgba(255,255,255,0.14)">
