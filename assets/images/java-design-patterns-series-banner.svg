<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Java design patterns series banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171311"/>
      <stop offset="45%" stop-color="#5c4634"/>
      <stop offset="100%" stop-color="#2c5a57"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe4" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#dcc6a8" stop-opacity="0.78"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f8fafc" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
