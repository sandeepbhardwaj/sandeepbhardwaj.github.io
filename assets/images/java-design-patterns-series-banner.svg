    <rect x="560" y="336" width="120" height="12" rx="6"/>
    <rect x="890" y="305" width="150" height="16" rx="8"/>
    <rect x="890" y="336" width="122" height="12" rx="6"/>
    <rect x="725" y="466" width="150" height="16" rx="8"/>
