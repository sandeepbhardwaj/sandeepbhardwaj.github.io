<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Java 8 Lambdas Banner</title>
  <desc id="desc">Minimal abstract banner with lambda example line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1300" cy="170" r="230" fill="#22d3ee" opacity="0.16"/>
  <circle cx="250" cy="760" r="280" fill="#38bdf8" opacity="0.10"/>
  <rect x="120" y="160" width="760" height="14" rx="7" fill="url(#accent)" opacity="0.88"/>
  <rect x="120" y="205" width="540" height="8" rx="4" fill="#cbd5e1" opacity="0.45"/>
  <rect x="120" y="230" width="390" height="8" rx="4" fill="#cbd5e1" opacity="0.28"/>
  <text x="120" y="305" fill="#e2e8f0" font-family="Courier New, monospace" font-size="34">Function&lt;Double, Double&gt; discount = t -&gt; t * 0.9;</text>
</svg>
