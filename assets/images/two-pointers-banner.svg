<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Two Pointers Technique Banner</title>
  <desc id="desc">Minimal abstract banner with two pointers movement example line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="150" r="220" fill="#4ade80" opacity="0.16"/>
  <circle cx="250" cy="760" r="280" fill="#38bdf8" opacity="0.10"/>
  <rect x="120" y="160" width="910" height="14" rx="7" fill="url(#accent)" opacity="0.88"/>
  <rect x="120" y="200" width="490" height="8" rx="4" fill="#cbd5e1" opacity="0.45"/>
  <rect x="120" y="225" width="340" height="8" rx="4" fill="#cbd5e1" opacity="0.28"/>
  <text x="120" y="305" fill="#e2e8f0" font-family="Courier New, monospace" font-size="33">while (left &lt; right) { if (sum &lt; target) left++; else right--; }</text>
</svg>
